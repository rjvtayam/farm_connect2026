{% extends "base.html" %}

{% block title %}429 - Too Many Requests{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/errors/errors.css') }}">
{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-image">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
                <defs>
                    <linearGradient id="g429" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
                        <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.12"/>
                    </linearGradient>
                </defs>
                <rect width="400" height="300" rx="20" fill="url(#g429)"/>
                <!-- Clock -->
                <circle cx="200" cy="130" r="55" fill="none" stroke="#8b5cf6" stroke-width="4" opacity="0.6"/>
                <circle cx="200" cy="130" r="48" fill="#8b5cf6" opacity="0.06"/>
                <line x1="200" y1="130" x2="200" y2="95" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
                <line x1="200" y1="130" x2="225" y2="140" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
                <circle cx="200" cy="130" r="4" fill="#8b5cf6" opacity="0.7"/>
                <!-- Speed lines -->
                <line x1="90" y1="210" x2="140" y2="210" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
                <line x1="110" y1="225" x2="170" y2="225" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                <line x1="230" y1="210" x2="310" y2="210" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
                <line x1="240" y1="225" x2="300" y2="225" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                <!-- Decorative dots -->
                <circle cx="80" cy="80" r="4" fill="#06b6d4" opacity="0.4"/>
                <circle cx="320" cy="90" r="6" fill="#8b5cf6" opacity="0.3"/>
            </svg>
        </div>
        <div class="error-text">
            <h1>429</h1>
            <h2>Too Many Requests</h2>
            <p>You've made too many requests in a short period. Please wait a moment and try again.</p>
            <div class="error-actions">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <button onclick="setTimeout(() => location.reload(), 1000)" class="btn btn-outline">
                    <i class="fas fa-clock"></i> Retry
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
