{% extends "base.html" %}

{% block title %}403 - Forbidden{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/errors/errors.css') }}">
{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-image">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
                <defs>
                    <linearGradient id="g403" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.15"/>
                        <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.15"/>
                    </linearGradient>
                </defs>
                <rect width="400" height="300" rx="20" fill="url(#g403)"/>
                <!-- Shield icon -->
                <path d="M200 60 L260 90 L260 160 C260 210 200 240 200 240 C200 240 140 210 140 160 L140 90 Z" fill="none" stroke="#4f46e5" stroke-width="4" opacity="0.8"/>
                <path d="M200 80 L245 103 L245 157 C245 197 200 222 200 222 C200 222 155 197 155 157 L155 103 Z" fill="#4f46e5" opacity="0.1"/>
                <!-- Lock icon inside shield -->
                <rect x="185" y="140" width="30" height="24" rx="4" fill="#4f46e5" opacity="0.7"/>
                <path d="M190 140 L190 130 C190 122 195 117 200 117 C205 117 210 122 210 130 L210 140" fill="none" stroke="#4f46e5" stroke-width="3" opacity="0.7"/>
                <circle cx="200" cy="150" r="3" fill="white"/>
                <!-- Decorative dots -->
                <circle cx="80" cy="80" r="4" fill="#06b6d4" opacity="0.4"/>
                <circle cx="320" cy="100" r="6" fill="#4f46e5" opacity="0.3"/>
                <circle cx="100" cy="220" r="5" fill="#4f46e5" opacity="0.2"/>
                <circle cx="300" cy="230" r="4" fill="#06b6d4" opacity="0.3"/>
            </svg>
        </div>
        <div class="error-text">
            <h1>403</h1>
            <h2>Access Denied</h2>
            <p>Sorry, you don't have permission to access this page.</p>
            <div class="error-actions">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <button onclick="history.back()" class="btn btn-outline">
                    <i class="fas fa-arrow-left"></i> Go Back
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
