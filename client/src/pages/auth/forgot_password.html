{% extends "base.html" %}

{% block title %}Forgot Password - Farm Connect{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth/auth.css') }}" />
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Forgot Password</h2>
            <p>Enter your email to receive a password reset link</p>
        </div>


        <!-- Flash messages are handled globally in base.html -->

        <form class="auth-form" method="POST"
            action="{{ url_for('auth.forgot_password') }}"
            id="forgotPasswordForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">


            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email Address"
                        required autocomplete="email">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Send Reset
                Link</button>

            <div class="auth-footer">
                <a href="{{ url_for('auth.login') }}" class="back-to-login">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</div>

<!-- ═══ Premium Auth Loading Overlay ═══ -->
<div class="login-overlay" id="authOverlay">
  <div class="login-overlay-backdrop"></div>
  <div class="login-overlay-card">
    <div class="login-overlay-spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-icon" id="overlayIcon">
        <i class="fas fa-envelope"></i>
      </div>
    </div>
    <h3 class="login-overlay-title" id="overlayTitle">Sending reset link</h3>
    <p class="login-overlay-sub">Please wait<span class="dot-pulse">...</span></p>
    <div class="login-overlay-bar">
      <div class="login-overlay-bar-fill"></div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/auth/auth.js') }}"></script>

{% endblock %}
