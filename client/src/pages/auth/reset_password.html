{% extends "base.html" %}

{% block title %}Reset Password - Farm Connect{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth/auth.css') }}" />
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Reset Password</h2>
            <p>Please enter your new password</p>
        </div>


        <!-- Flash messages are handled globally in base.html -->

        <form class="auth-form" method="POST"
            action="{{ url_for('auth.reset_password', token=token) }}"
            id="resetPasswordForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">


            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password"
                        placeholder="New Password" required minlength="8" autocomplete="new-password">
                    <button type="button" class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar"></div>
                    <span class="strength-text"></span>
                </div>
            </div>

            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="confirm_password"
                        id="confirm_password" placeholder="Confirm Password"
                        required minlength="8" autocomplete="new-password">
                    <button type="button" class="password-toggle"
                        onclick="togglePassword('confirm_password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Reset
                Password</button>

            <div class="auth-footer">
                <a href="{{ url_for('auth.login') }}" class="back-to-login">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</div>

<!-- ═══ Premium Auth Loading Overlay ═══ -->
<div class="login-overlay" id="authOverlay">
  <div class="login-overlay-backdrop"></div>
  <div class="login-overlay-card">
    <div class="login-overlay-spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-icon" id="overlayIcon">
        <i class="fas fa-lock"></i>
      </div>
    </div>
    <h3 class="login-overlay-title" id="overlayTitle">Resetting your password</h3>
    <p class="login-overlay-sub">Please wait<span class="dot-pulse">...</span></p>
    <div class="login-overlay-bar">
      <div class="login-overlay-bar-fill"></div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/auth/auth.js') }}"></script>

{% endblock %}
